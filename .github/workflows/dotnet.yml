# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_NAME: MeetingNotes
  ProjectLocation: bin/Release/net10.0-windows7.0/win-x64/

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
    - uses: actions/checkout@v4
    - name: Extract version from csproj
      id: extract
      run: |
        VERSION=$(grep -oP '(?<=<AssemblyVersion>)[^<]+' MeetingNotes.csproj)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "App version: $VERSION"

  build-windows:
    runs-on: windows-latest
    needs: get-version
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore MeetingNotes.csproj -r win-x64
    - name: Build Windows
      run: dotnet build MeetingNotes.csproj -r win-x64 --no-restore -c Release
    - name: Zip Windows build
      run: Compress-Archive -Path ${{ env.ProjectLocation }}* -DestinationPath "${{ env.APP_NAME }} - ${{ env.VERSION }}.zip"
    - name: Publish Windows app (for MSI)
      run: dotnet publish MeetingNotes.csproj -r win-x64 --no-restore -c Release -o publish\ --self-contained false
    - name: Derive MSI-compatible version
      id: msi_ver
      shell: pwsh
      run: |
        $parts = "${{ env.VERSION }}".Split('.')
        $yy   = [int]$parts[1] - 2000
        $mmdd = [int]$parts[2] * 100 + [int]$parts[3]
        "msi_version=1.$yy.$mmdd" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
    - name: Install WiX
      run: dotnet tool install --global wix
    - name: Accept WiX EULA
      run: wix eula accept wix7
    - name: Build MSI
      shell: pwsh
      run: |
        $publishAbs = (Resolve-Path publish).Path
        wix build Installer\installer.wxs -d "PublishDir=$publishAbs" -d Version=${{ steps.msi_ver.outputs.msi_version }} -o nccameetingnotes.msi
    - name: Sign MSI
      shell: pwsh
      run: |
        $pfxPath = "signing.pfx"
        [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String("${{ secrets.SIGNING_CERT_PFX }}"))
        $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" | Where-Object { $_.FullName -like "*x64*" } | Select-Object -Last 1).FullName
        & $signtool sign /fd SHA256 /p "${{ secrets.SIGNING_CERT_PASSWORD }}" /f $pfxPath nccameetingnotes.msi
        Remove-Item $pfxPath
    - name: Upload Windows build
      uses: actions/upload-artifact@v4
      with:
        name: windows-app
        path: |
          ${{ env.APP_NAME }} - ${{ env.VERSION }}.zip
          nccameetingnotes.msi

  release:
    needs: [get-version, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
    steps:
    - name: Download Windows build
      uses: actions/download-artifact@v4
      with:
        name: windows-app
        path: artifacts/windows
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}-build.${{ github.run_number }}
        name: "${{ env.APP_NAME }} - ${{ env.VERSION }}"
        body: "Automated release from commit ${{ github.sha }}"
        files: |
          artifacts/windows/*.zip
          artifacts/windows/nccameetingnotes.msi
    - name: Upload MSI to Azure Blob Storage
      run: |
        az storage blob upload \
          --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
          --container-name releases \
          --file artifacts/windows/nccameetingnotes.msi \
          --name nccameetingnotes.msi \
          --overwrite