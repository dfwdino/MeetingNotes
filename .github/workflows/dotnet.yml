# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_NAME: MeetingNotes
  ProjectLocation: bin/Release/net10.0-windows7.0/win-x64/

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
    - uses: actions/checkout@v4
    - name: Extract version from csproj
      id: extract
      run: |
        VERSION=$(grep -oP '(?<=<AssemblyVersion>)[^<]+' MeetingNotes.csproj)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "App version: $VERSION"

  build-windows:
    runs-on: windows-latest
    needs: get-version
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore MeetingNotes.csproj -r win-x64
    - name: Build Windows
      run: dotnet build MeetingNotes.csproj -r win-x64 --no-restore -c Release
    - name: Zip Windows build
      run: Compress-Archive -Path ${{ env.ProjectLocation }}* -DestinationPath "${{ env.APP_NAME }} - ${{ env.VERSION }}.zip"
    - name: Upload Windows build
      uses: actions/upload-artifact@v4
      with:
        name: windows-app
        path: "${{ env.APP_NAME }} - ${{ env.VERSION }}.zip"

  release:
    needs: [get-version, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
    steps:
    - name: Download Windows build
      uses: actions/download-artifact@v4
      with:
        name: windows-app
        path: artifacts/windows
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}-build.${{ github.run_number }}
        name: "${{ env.APP_NAME }} - ${{ env.VERSION }}"
        body: "Automated release from commit ${{ github.sha }}"
        files: |
          artifacts/windows/*.zip